<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Restablecer contraseña — Horario</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%230d1117'/%3E%3Crect x='4' y='8' width='24' height='20' rx='3' fill='%23161b22' stroke='%2321262d' stroke-width='1'/%3E%3Crect x='4' y='8' width='24' height='8' rx='3' fill='%233dd68c'/%3E%3Crect x='4' y='13' width='24' height='3' fill='%233dd68c'/%3E%3Ccircle cx='10' cy='6' r='2' fill='%233dd68c'/%3E%3Ccircle cx='22' cy='6' r='2' fill='%233dd68c'/%3E%3Crect x='8' y='21' width='4' height='4' rx='1' fill='%233dd68c' opacity='0.7'/%3E%3Crect x='14' y='21' width='4' height='4' rx='1' fill='%233dd68c' opacity='0.4'/%3E%3Crect x='20' y='21' width='4' height='4' rx='1' fill='%233dd68c' opacity='0.2'/%3E%3C/svg%3E">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d1117; --surface: #161b22; --accent: #3dd68c; --accent2: #2ab97a;
    --text: #e6edf3; --text-muted: #8b949e; --border: #21262d;
    --prio-high: #ff7b72;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg); color: var(--text);
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
  }
  .box {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 16px; padding: 40px 36px; width: 360px; max-width: 90vw;
    display: flex; flex-direction: column; gap: 20px;
  }
  .logo { font-size: 28px; font-weight: 700; color: var(--accent); text-align: center; }
  .subtitle { text-align: center; font-size: 13px; color: var(--text-muted); margin-top: -12px; }
  label { font-size: 12px; color: var(--text-muted); margin-bottom: 4px; display: block; }
  input {
    width: 100%; background: var(--bg); border: 1px solid var(--border);
    color: var(--text); border-radius: 8px; padding: 10px 14px;
    font-family: inherit; font-size: 14px; outline: none; transition: border-color 0.15s;
  }
  input:focus { border-color: var(--accent); }
  .btn {
    background: var(--accent); color: #0d1117; border: none; border-radius: 8px;
    padding: 11px; font-family: inherit; font-size: 14px; font-weight: 700;
    cursor: pointer; transition: background 0.15s; width: 100%;
  }
  .btn:hover { background: var(--accent2); }
  .error {
    background: rgba(255,123,114,0.12); border: 1px solid rgba(255,123,114,0.3);
    color: #ff7b72; border-radius: 8px; padding: 10px 14px; font-size: 13px; display: none;
  }
  .success {
    background: rgba(61,214,140,0.12); border: 1px solid rgba(61,214,140,0.3);
    color: var(--accent); border-radius: 8px; padding: 10px 14px; font-size: 13px; display: none;
    text-align: center;
  }
  .back { text-align: center; font-size: 13px; }
  .back a { color: var(--text-muted); text-decoration: none; }
  .back a:hover { color: var(--accent); }
  #formWrap { display: flex; flex-direction: column; gap: 14px; }
  #invalidMsg { text-align: center; color: var(--prio-high); font-size: 14px; }
</style>
</head>
<body>
<div class="box">
  <div class="logo">📅 Horario</div>
  <div class="subtitle">Restablecer contraseña</div>

  <div id="invalidMsg" style="display:none">
    ❌ Este enlace es inválido o ya expiró.<br>
    <a href="/" style="color:var(--text-muted);font-size:13px">Solicitar uno nuevo</a>
  </div>

  <div id="formWrap">
    <div>
      <label>Nueva contraseña</label>
      <input type="password" id="newPass" placeholder="mínimo 4 caracteres" autofocus>
    </div>
    <div>
      <label>Confirmar contraseña</label>
      <input type="password" id="confirmPass" placeholder="repite la contraseña">
    </div>
    <div class="error"   id="errMsg"></div>
    <div class="success" id="okMsg"></div>
    <button class="btn" onclick="doReset()">Guardar nueva contraseña</button>
  </div>

  <div class="back"><a href="/">← Volver al calendario</a></div>
</div>

<script>
const token = new URLSearchParams(window.location.search).get('token');

if (!token) {
  document.getElementById('formWrap').style.display  = 'none';
  document.getElementById('invalidMsg').style.display = 'block';
}

async function doReset() {
  const pass    = document.getElementById('newPass').value;
  const confirm = document.getElementById('confirmPass').value;
  const errEl   = document.getElementById('errMsg');
  const okEl    = document.getElementById('okMsg');
  errEl.style.display = 'none';
  okEl.style.display  = 'none';

  if (!pass || !confirm) { errEl.textContent = 'Completa ambos campos'; errEl.style.display = 'block'; return; }
  if (pass !== confirm)  { errEl.textContent = 'Las contraseñas no coinciden'; errEl.style.display = 'block'; return; }
  if (pass.length < 4)   { errEl.textContent = 'Mínimo 4 caracteres'; errEl.style.display = 'block'; return; }

  try {
    const res  = await fetch('/reset', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token, password: pass })
    });
    const data = await res.json();
    if (!data.ok) {
      if (data.error?.includes('inválido') || data.error?.includes('expiró')) {
        document.getElementById('formWrap').style.display   = 'none';
        document.getElementById('invalidMsg').style.display = 'block';
      } else {
        errEl.textContent = data.error || 'Error'; errEl.style.display = 'block';
      }
      return;
    }
    document.getElementById('formWrap').style.display = 'none';
    okEl.innerHTML = '✅ Contraseña actualizada.<br><a href="/" style="color:var(--accent)">Ir al calendario →</a>';
    okEl.style.display = 'block';
  } catch(e) {
    errEl.textContent = 'No se pudo conectar'; errEl.style.display = 'block';
  }
}

document.addEventListener('keydown', e => { if (e.key === 'Enter') doReset(); });
</script>
</body>
</html>
