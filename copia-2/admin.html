<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel Admin — Horario</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%230d1117'/%3E%3Crect x='4' y='8' width='24' height='20' rx='3' fill='%23161b22' stroke='%2321262d' stroke-width='1'/%3E%3Crect x='4' y='8' width='24' height='8' rx='3' fill='%233dd68c'/%3E%3Crect x='4' y='13' width='24' height='3' fill='%233dd68c'/%3E%3Ccircle cx='10' cy='6' r='2' fill='%233dd68c'/%3E%3Ccircle cx='22' cy='6' r='2' fill='%233dd68c'/%3E%3Crect x='8' y='21' width='4' height='4' rx='1' fill='%233dd68c' opacity='0.7'/%3E%3Crect x='14' y='21' width='4' height='4' rx='1' fill='%233dd68c' opacity='0.4'/%3E%3Crect x='20' y='21' width='4' height='4' rx='1' fill='%233dd68c' opacity='0.2'/%3E%3C/svg%3E">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d1117; --surface: #161b22; --surface2: #1c2840;
    --accent: #3dd68c; --accent2: #2ab97a;
    --text: #e6edf3; --text-muted: #8b949e; --border: #21262d;
    --danger: #ff7b72; --danger-bg: rgba(255,123,114,0.1);
    --warn: #e3b341;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }

  /* ─── TOPBAR ─────────────────────────────────────────── */
  .topbar {
    display:flex; align-items:center; gap:16px;
    padding:14px 24px; background:var(--surface);
    border-bottom:1px solid var(--border);
  }
  .logo { font-size:18px; font-weight:700; color:var(--accent); }
  .admin-badge {
    background:rgba(227,179,65,0.15); color:var(--warn);
    border:1px solid rgba(227,179,65,0.3);
    border-radius:6px; padding:3px 10px; font-size:12px; font-weight:600;
  }
  .back-btn {
    margin-left:auto; background:none; border:1px solid var(--border);
    color:var(--text-muted); padding:6px 14px; border-radius:8px;
    cursor:pointer; font-family:inherit; font-size:13px; transition:all 0.15s;
    text-decoration:none; display:inline-flex; align-items:center; gap:6px;
  }
  .back-btn:hover { border-color:var(--accent); color:var(--accent); }

  /* ─── CONTENIDO ──────────────────────────────────────── */
  .container { max-width:900px; margin:32px auto; padding:0 24px; }
  .section-title {
    font-size:16px; font-weight:600; color:var(--text);
    margin-bottom:16px; display:flex; align-items:center; gap:8px;
  }
  .user-count {
    background:var(--surface2); color:var(--text-muted);
    border-radius:20px; padding:2px 10px; font-size:12px; font-weight:500;
  }

  /* ─── TABLA DE USUARIOS ──────────────────────────────── */
  .users-table {
    background:var(--surface); border:1px solid var(--border);
    border-radius:12px; overflow:hidden;
  }
  .users-table-header {
    display:grid; grid-template-columns: 2fr 2.5fr 1fr 1fr;
    padding:10px 20px; background:var(--bg);
    border-bottom:1px solid var(--border);
    font-size:11px; font-weight:600; color:var(--text-muted);
    text-transform:uppercase; letter-spacing:0.8px;
  }
  .user-row {
    display:grid; grid-template-columns: 2fr 2.5fr 1fr 1fr;
    padding:14px 20px; border-bottom:1px solid var(--border);
    align-items:center; transition:background 0.1s;
  }
  .user-row:last-child { border-bottom:none; }
  .user-row:hover { background:rgba(255,255,255,0.02); }

  .user-avatar-sm {
    width:28px; height:28px; background:var(--accent); color:#0d1117;
    border-radius:50%; display:inline-flex; align-items:center; justify-content:center;
    font-size:12px; font-weight:700; text-transform:uppercase; margin-right:10px;
    flex-shrink:0;
  }
  .user-avatar-sm.self { background:var(--warn); }
  .user-name-cell { display:flex; align-items:center; }
  .username { font-weight:500; font-size:14px; }
  .self-tag {
    background:rgba(227,179,65,0.15); color:var(--warn);
    border-radius:4px; padding:1px 6px; font-size:10px; font-weight:600; margin-left:8px;
  }
  .user-email { font-size:13px; color:var(--text-muted); font-family:'DM Mono',monospace; }
  .user-date  { font-size:12px; color:var(--text-muted); }

  .user-actions { display:flex; gap:6px; justify-content:flex-end; }
  .btn-reset {
    background:none; border:1px solid var(--border); color:var(--text-muted);
    padding:5px 10px; border-radius:6px; cursor:pointer; font-family:inherit;
    font-size:12px; transition:all 0.15s;
  }
  .btn-reset:hover { border-color:var(--accent); color:var(--accent); }
  .btn-del {
    background:none; border:1px solid transparent; color:var(--text-muted);
    padding:5px 10px; border-radius:6px; cursor:pointer; font-family:inherit;
    font-size:12px; transition:all 0.15s;
  }
  .btn-del:hover { border-color:var(--danger); color:var(--danger); background:var(--danger-bg); }
  .btn-del:disabled, .btn-reset:disabled { opacity:0.3; cursor:not-allowed; }

  /* ─── MODAL ──────────────────────────────────────────── */
  .modal-overlay {
    position:fixed; inset:0; background:rgba(0,0,0,0.6);
    display:flex; align-items:center; justify-content:center;
    z-index:100; opacity:0; pointer-events:none; transition:opacity 0.2s;
  }
  .modal-overlay.open { opacity:1; pointer-events:all; }
  .modal {
    background:var(--surface); border:1px solid var(--border);
    border-radius:14px; padding:28px; width:340px; max-width:90vw;
    display:flex; flex-direction:column; gap:16px;
    transform:translateY(12px); transition:transform 0.2s;
  }
  .modal-overlay.open .modal { transform:translateY(0); }
  .modal h3 { font-size:16px; font-weight:600; }
  .modal p  { font-size:13px; color:var(--text-muted); line-height:1.5; }
  .modal label { font-size:12px; color:var(--text-muted); margin-bottom:4px; display:block; }
  .modal input {
    width:100%; background:var(--bg); border:1px solid var(--border);
    color:var(--text); border-radius:8px; padding:9px 12px;
    font-family:inherit; font-size:14px; outline:none;
  }
  .modal input:focus { border-color:var(--accent); }
  .modal-actions { display:flex; gap:8px; justify-content:flex-end; }
  .btn-cancel-modal {
    background:none; border:1px solid var(--border); color:var(--text-muted);
    padding:8px 16px; border-radius:8px; cursor:pointer; font-family:inherit; font-size:13px;
  }
  .btn-confirm {
    background:var(--accent); color:#0d1117; border:none;
    padding:8px 16px; border-radius:8px; cursor:pointer; font-family:inherit;
    font-size:13px; font-weight:700; transition:background 0.15s;
  }
  .btn-confirm:hover { background:var(--accent2); }
  .btn-confirm.danger { background:var(--danger); color:#fff; }
  .btn-confirm.danger:hover { background:#e05a52; }
  .modal-error {
    background:var(--danger-bg); border:1px solid rgba(255,123,114,0.3);
    color:var(--danger); border-radius:8px; padding:8px 12px; font-size:13px; display:none;
  }
  .modal-ok {
    background:rgba(61,214,140,0.1); border:1px solid rgba(61,214,140,0.3);
    color:var(--accent); border-radius:8px; padding:8px 12px; font-size:13px; display:none;
  }

  /* ─── LOADING / EMPTY ────────────────────────────────── */
  .loading { text-align:center; padding:40px; color:var(--text-muted); font-size:14px; }
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <span class="logo">📅 Horario</span>
  <span class="admin-badge">⚙️ Admin</span>
  <a href="/" class="back-btn">← Ir al calendario</a>
</div>

<!-- CONTENIDO -->
<div class="container">
  <div class="section-title">
    👥 Usuarios registrados
    <span class="user-count" id="userCount">—</span>
  </div>

  <div class="users-table">
    <div class="users-table-header">
      <div>Usuario</div>
      <div>Correo</div>
      <div>Registro</div>
      <div></div>
    </div>
    <div id="userList">
      <div class="loading">Cargando...</div>
    </div>
  </div>
</div>

<!-- MODAL: Resetear contraseña -->
<div class="modal-overlay" id="resetModal">
  <div class="modal">
    <h3>🔑 Resetear contraseña</h3>
    <p id="resetModalDesc"></p>
    <div>
      <label>Nueva contraseña</label>
      <input type="password" id="resetNewPass" placeholder="mínimo 4 caracteres">
    </div>
    <div>
      <label>Confirmar contraseña</label>
      <input type="password" id="resetConfirmPass" placeholder="repite la contraseña">
    </div>
    <div class="modal-error" id="resetError"></div>
    <div class="modal-ok"    id="resetOk"></div>
    <div class="modal-actions">
      <button class="btn-cancel-modal" onclick="closeModal('resetModal')">Cancelar</button>
      <button class="btn-confirm" onclick="confirmReset()">Guardar</button>
    </div>
  </div>
</div>

<!-- MODAL: Eliminar usuario -->
<div class="modal-overlay" id="deleteModal">
  <div class="modal">
    <h3>🗑️ Eliminar usuario</h3>
    <p id="deleteModalDesc"></p>
    <div class="modal-error" id="deleteError"></div>
    <div class="modal-actions">
      <button class="btn-cancel-modal" onclick="closeModal('deleteModal')">Cancelar</button>
      <button class="btn-confirm danger" onclick="confirmDelete()">Eliminar</button>
    </div>
  </div>
</div>

<script>
const SERVER = window.location.origin;
// Token puede venir por URL (?token=...) o por sessionStorage
const urlToken = new URLSearchParams(window.location.search).get('token');
let authToken  = urlToken || sessionStorage.getItem('authToken') || null;
let users     = [];
let targetUser = null;

function authFetch(url, options = {}) {
  options.credentials = 'include';
  options.headers = options.headers || {};
  if (authToken) options.headers['Authorization'] = `Bearer ${authToken}`;
  return fetch(url, options);
}

function fmtDate(ts) {
  if (!ts) return '—';
  return new Date(ts).toLocaleDateString('es-CO', { day:'2-digit', month:'short', year:'numeric' });
}

async function loadUsers() {
  try {
    const res  = await authFetch(`${SERVER}/admin/usuarios`);
    if (res.status === 403) {
      document.getElementById('userList').innerHTML =
        '<div class="loading" style="color:var(--danger)">❌ Acceso denegado</div>';
      return;
    }
    users = await res.json();
    renderUsers();
  } catch(e) {
    document.getElementById('userList').innerHTML =
      '<div class="loading" style="color:var(--danger)">Error al cargar usuarios</div>';
  }
}

function renderUsers() {
  document.getElementById('userCount').textContent = `${users.length} usuario${users.length !== 1 ? 's' : ''}`;
  const list = document.getElementById('userList');
  if (!users.length) {
    list.innerHTML = '<div class="loading">Sin usuarios</div>';
    return;
  }
  list.innerHTML = users.map(u => {
    const isSelf = u.is_admin === 1 || u.is_admin === true;
    return `
    <div class="user-row">
      <div class="user-name-cell">
        <div class="user-avatar-sm ${isSelf ? 'self' : ''}">${u.username.charAt(0).toUpperCase()}</div>
        <span class="username">${u.username}</span>
        ${isSelf ? '<span class="self-tag">tú</span>' : ''}
      </div>
      <div class="user-email">${u.email || '<span style="opacity:0.4">sin correo</span>'}</div>
      <div class="user-date">${fmtDate(u.created_at)}</div>
      <div class="user-actions">
        <button class="btn-reset" onclick="openReset(${u.id}, '${u.username}')">🔑 Reset</button>
        <button class="btn-del" onclick="openDelete(${u.id}, '${u.username}')"
          ${isSelf ? 'disabled title="No puedes eliminarte a ti mismo"' : ''}>🗑️</button>
      </div>
    </div>`;
  }).join('');
}

// ── Modal Reset ──────────────────────────────────────────────────────
function openReset(id, username) {
  targetUser = { id, username };
  document.getElementById('resetModalDesc').textContent =
    `Establece una nueva contraseña para el usuario "${username}".`;
  document.getElementById('resetNewPass').value     = '';
  document.getElementById('resetConfirmPass').value = '';
  document.getElementById('resetError').style.display = 'none';
  document.getElementById('resetOk').style.display    = 'none';
  document.getElementById('resetModal').classList.add('open');
  setTimeout(() => document.getElementById('resetNewPass').focus(), 100);
}

async function confirmReset() {
  const pass    = document.getElementById('resetNewPass').value;
  const confirm = document.getElementById('resetConfirmPass').value;
  const errEl   = document.getElementById('resetError');
  const okEl    = document.getElementById('resetOk');
  errEl.style.display = 'none'; okEl.style.display = 'none';

  if (!pass)           { errEl.textContent = 'Ingresa la nueva contraseña'; errEl.style.display='block'; return; }
  if (pass !== confirm){ errEl.textContent = 'Las contraseñas no coinciden'; errEl.style.display='block'; return; }
  if (pass.length < 4) { errEl.textContent = 'Mínimo 4 caracteres'; errEl.style.display='block'; return; }

  try {
    const res  = await authFetch(`${SERVER}/admin/reset-password`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ user_id: targetUser.id, password: pass })
    });
    const data = await res.json();
    if (!data.ok) { errEl.textContent = data.error || 'Error'; errEl.style.display='block'; return; }
    okEl.textContent   = `✅ Contraseña de "${targetUser.username}" actualizada.`;
    okEl.style.display = 'block';
    setTimeout(() => closeModal('resetModal'), 1500);
  } catch(e) {
    errEl.textContent = 'Error de conexión'; errEl.style.display='block';
  }
}

// ── Modal Delete ─────────────────────────────────────────────────────
function openDelete(id, username) {
  targetUser = { id, username };
  document.getElementById('deleteModalDesc').textContent =
    `¿Seguro que quieres eliminar a "${username}"? Se borrarán todos sus eventos, tareas y notas. Esta acción no se puede deshacer.`;
  document.getElementById('deleteError').style.display = 'none';
  document.getElementById('deleteModal').classList.add('open');
}

async function confirmDelete() {
  const errEl = document.getElementById('deleteError');
  errEl.style.display = 'none';
  try {
    const res  = await authFetch(`${SERVER}/admin/delete`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ user_id: targetUser.id })
    });
    const data = await res.json();
    if (!data.ok) { errEl.textContent = data.error || 'Error'; errEl.style.display='block'; return; }
    closeModal('deleteModal');
    loadUsers();
  } catch(e) {
    errEl.textContent = 'Error de conexión'; errEl.style.display='block';
  }
}

function closeModal(id) {
  document.getElementById(id).classList.remove('open');
  targetUser = null;
}

// Cerrar modal con Escape
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    document.querySelectorAll('.modal-overlay.open').forEach(m => m.classList.remove('open'));
  }
});
// Cerrar modal al hacer click fuera
document.querySelectorAll('.modal-overlay').forEach(overlay => {
  overlay.addEventListener('click', e => {
    if (e.target === overlay) overlay.classList.remove('open');
  });
});

// ── Init ─────────────────────────────────────────────────────────────
(async () => {
  // Verificar que el usuario es admin antes de cargar
  try {
    const res  = await authFetch(`${SERVER}/me`);
    const data = await res.json();
    if (!data.ok || !data.is_admin) {
      document.getElementById('userList').innerHTML =
        '<div class="loading" style="color:var(--danger)">❌ Acceso denegado — solo administradores</div>';
      return;
    }
  } catch(e) {
    document.getElementById('userList').innerHTML =
      '<div class="loading" style="color:var(--danger)">Error al verificar sesión</div>';
    return;
  }
  loadUsers();
})();
</script>
</body>
</html>
